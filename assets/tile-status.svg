<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Quu Station Status preview">
  <defs>
    <linearGradient id="statusBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2320"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <radialGradient id="statusGlow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="250" fill="url(#statusBg)"/>
  <rect width="400" height="250" fill="url(#statusGlow)"/>

  <!-- window chrome -->
  <rect x="0" y="0" width="400" height="28" fill="#0d1c25"/>
  <circle cx="18" cy="14" r="4" fill="#f0785a"/>
  <circle cx="32" cy="14" r="4" fill="#f0c352"/>
  <circle cx="46" cy="14" r="4" fill="#5ec98a"/>
  <rect x="70" y="9" width="180" height="10" rx="5" fill="#152a24"/>

  <!-- status cards -->
  <g>
    <rect x="40" y="52" width="90" height="56" rx="8" fill="#12241f" stroke="#1e3a30" stroke-width="1"/>
    <circle cx="60" cy="72" r="7" fill="none" stroke="#4ade80" stroke-width="2.5"/>
    <path d="M56 72 l3 3 l6 -7" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="78" y="68" width="38" height="7" rx="3.5" fill="#1e3a30"/>

    <rect x="140" y="52" width="90" height="56" rx="8" fill="#12241f" stroke="#1e3a30" stroke-width="1"/>
    <circle cx="160" cy="72" r="7" fill="none" stroke="#4ade80" stroke-width="2.5"/>
    <path d="M156 72 l3 3 l6 -7" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="178" y="68" width="38" height="7" rx="3.5" fill="#1e3a30"/>

    <rect x="240" y="52" width="90" height="56" rx="8" fill="#12241f" stroke="#1e3a30" stroke-width="1"/>
    <circle cx="260" cy="72" r="7" fill="none" stroke="#f0c352" stroke-width="2.5"/>
    <rect x="257" y="68" width="6" height="6" rx="1" fill="#f0c352"/>
    <rect x="278" y="68" width="38" height="7" rx="3.5" fill="#1e3a30"/>
  </g>

  <!-- uptime graph -->
  <polyline points="40,190 80,170 120,182 160,150 200,160 240,130 280,140 320,110 360,120"
    fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <polygon points="40,190 80,170 120,182 160,150 200,160 240,130 280,140 320,110 360,120 360,215 40,215"
    fill="#4ade80" opacity="0.12"/>
</svg>
