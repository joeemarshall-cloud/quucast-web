<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuuCast Launcher</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="brand">
        <img class="brand-logo brand-logo-light" src="assets/quu-logo-light.svg" alt="Quu" />
        <img class="brand-logo brand-logo-dark" src="assets/quu-logo-dark.svg" alt="Quu" />
        <div>
          <p class="eyebrow">QuuCast</p>
          <h1>App Launcher</h1>
        </div>
      </div>
    </header>

    <main>
      <section class="tile-grid" id="dashboard-tiles">
        <div class="empty-state">Loading apps…</div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
